<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGNAL — чат</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0d0d0f;--surface:#141418;--surface2:#1c1c22;
    --border:#2a2a35;--accent:#7c6dfa;--green:#4dfa9a;
    --red:#fa6d6d;--text:#e8e8f0;--muted:#6b6b80;
  }
  body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;height:100vh;overflow:hidden;display:flex;flex-direction:column}

  #joinScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100}
  .join-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;width:360px;display:flex;flex-direction:column;gap:16px}
  .join-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--accent);letter-spacing:4px;text-align:center}
  .join-sub{font-size:11px;color:var(--muted);text-align:center;letter-spacing:2px}
  .field-label{font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:6px}
  input[type=text]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;outline:none;transition:border-color .2s}
  input[type=text]:focus{border-color:var(--accent)}
  .join-btn{background:var(--accent);border:none;border-radius:8px;padding:12px;color:white;font-family:'Syne',sans-serif;font-weight:600;font-size:14px;letter-spacing:2px;cursor:pointer;transition:opacity .2s}
  .join-btn:hover{opacity:.85}
  .join-btn:disabled{opacity:.4;cursor:not-allowed}
  .conn-status{font-size:11px;text-align:center;color:var(--muted)}
  .conn-status.err{color:var(--red)}

  .header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
  .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:4px;color:var(--accent)}
  .status-bar{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
  .dot.off{background:var(--red);box-shadow:0 0 8px var(--red);animation:none}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  .layout{display:flex;flex:1;overflow:hidden}
  .sidebar{width:200px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--surface);flex-shrink:0}
  .sidebar-hdr{padding:14px 16px 10px;font-size:10px;letter-spacing:3px;color:var(--muted);border-bottom:1px solid var(--border)}
  #userList{flex:1;overflow-y:auto;padding:8px}
  .user-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;font-size:12px}
  .uavatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;font-family:'Syne',sans-serif}
  .uname{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .you-tag{font-size:9px;color:var(--accent);letter-spacing:1px}

  .chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
  #messages{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:2px}
  #messages::-webkit-scrollbar{width:4px}
  #messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

  .msg-group{display:flex;flex-direction:column;margin-bottom:10px}
  .msg-group.me{align-items:flex-end}
  .msg-group.other{align-items:flex-start}
  .msg-meta{font-size:10px;color:var(--muted);margin-bottom:3px;display:flex;gap:6px;align-items:baseline}
  .msg-group.me .msg-meta{flex-direction:row-reverse}

  .bubble{max-width:65%;padding:9px 14px;border-radius:14px;font-size:13px;line-height:1.6;word-break:break-word;animation:msgIn .18s ease-out}
  @keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .msg-group.me .bubble{background:var(--accent);color:white;border-bottom-right-radius:4px}
  .msg-group.other .bubble{background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px}
  .sys-msg{text-align:center;font-size:11px;color:var(--muted);padding:6px 0;letter-spacing:1px}

  /* IMAGE BUBBLE */
  .img-bubble{max-width:65%;border-radius:12px;overflow:hidden;cursor:zoom-in;animation:msgIn .18s ease-out}
  .img-bubble img{display:block;max-width:280px;max-height:220px;width:100%;object-fit:cover;transition:opacity .15s}
  .img-bubble img:hover{opacity:.88}
  .msg-group.me .img-bubble{border-bottom-right-radius:4px}
  .msg-group.other .img-bubble{border-bottom-left-radius:4px}

  /* PREVIEW BAR */
  #imgPreviewBar{display:none;padding:8px 24px;background:var(--surface);border-top:1px solid var(--border);align-items:center;gap:12px;flex-shrink:0}
  #imgPreviewBar.show{display:flex}
  #imgPreviewThumb{width:48px;height:48px;object-fit:cover;border-radius:8px;border:1px solid var(--border)}
  #imgPreviewName{font-size:11px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rm-btn{background:none;border:none;color:var(--red);font-size:22px;cursor:pointer;line-height:1;padding:0 2px}

  /* INPUT */
  .input-area{padding:16px 24px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
  .input-row{display:flex;align-items:flex-end;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:10px 14px;transition:border-color .2s}
  .input-row:focus-within{border-color:var(--accent)}
  #msgInput{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;resize:none;max-height:120px;line-height:1.5}
  #msgInput::placeholder{color:var(--muted)}
  .img-btn{background:none;border:none;color:var(--muted);font-size:19px;cursor:pointer;padding:2px;transition:color .2s;flex-shrink:0}
  .img-btn:hover{color:var(--accent)}
  #fileInput{display:none}
  .send-btn{background:var(--accent);border:none;border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:white;font-size:15px;transition:opacity .2s,transform .1s;flex-shrink:0}
  .send-btn:hover{opacity:.85}
  .send-btn:active{transform:scale(.93)}
  .send-btn:disabled{opacity:.4;cursor:not-allowed}

  /* LIGHTBOX */
  #lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:16px;cursor:zoom-out}
  #lightbox.show{display:flex}
  #lightboxImg{max-width:90vw;max-height:85vh;border-radius:10px;object-fit:contain;box-shadow:0 0 80px rgba(0,0,0,.9)}
  .lb-close{position:fixed;top:18px;right:22px;background:rgba(255,255,255,.1);border:none;color:white;font-size:22px;width:38px;height:38px;border-radius:50%;cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:center}
  .lb-close:hover{background:rgba(255,255,255,.2)}
  .lb-download{background:var(--accent);border:none;border-radius:8px;padding:10px 28px;color:white;font-family:'Syne',sans-serif;font-size:13px;letter-spacing:1px;cursor:pointer;transition:opacity .2s}
  .lb-download:hover{opacity:.85}
</style>
</head>
<body>

<div id="joinScreen">
  <div class="join-box">
    <div class="join-title">SIGNAL</div>
    <div class="join-sub">// реальный чат в реальном времени</div>
    <div>
      <div class="field-label">АДРЕС СЕРВЕРА</div>
      <input type="text" id="serverUrl" placeholder="wss://твой-сервер.railway.app" />
    </div>
    <div>
      <div class="field-label">ТВОЁ ИМЯ</div>
      <input type="text" id="nameInput" placeholder="Введи имя..." maxlength="20" />
    </div>
    <button class="join-btn" id="joinBtn" onclick="connect()">ВОЙТИ В ЧАТ</button>
    <div class="conn-status" id="connStatus">введи адрес сервера и имя</div>
  </div>
</div>

<div class="header">
  <div class="logo">SIGNAL</div>
  <div class="status-bar">
    <div class="dot off" id="statusDot"></div>
    <span id="statusText">не подключён</span>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-hdr">// онлайн</div>
    <div id="userList"></div>
  </div>
  <div class="chat-area">
    <div id="messages"></div>

    <div id="imgPreviewBar">
      <img id="imgPreviewThumb" src="" alt="">
      <span id="imgPreviewName"></span>
      <button class="rm-btn" onclick="removeImage()">×</button>
    </div>

    <div class="input-area">
      <div class="input-row">
        <button class="img-btn" onclick="document.getElementById('fileInput').click()" title="Прикрепить картинку">🖼</button>
        <input type="file" id="fileInput" accept="image/*" onchange="handleImageSelect(event)">
        <textarea id="msgInput" rows="1" placeholder="Написать сообщение..." disabled></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMsg()" disabled>➤</button>
      </div>
    </div>
  </div>
</div>

<div id="lightbox" onclick="closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="">
  <button class="lb-download" onclick="downloadImg(event)">⬇ Скачать</button>
</div>

<script>
let ws = null, myName = '', pendingImage = null, lbSrc = '';

function connect() {
  const url = document.getElementById('serverUrl').value.trim();
  const name = document.getElementById('nameInput').value.trim();
  const st = document.getElementById('connStatus');
  if (!url || !name) { st.textContent='⚠ Заполни оба поля'; st.className='conn-status err'; return; }
  myName = name;
  st.textContent = 'Подключаемся...'; st.className = 'conn-status';
  document.getElementById('joinBtn').disabled = true;
  try { ws = new WebSocket(url); } catch {
    st.textContent='✗ Неверный адрес'; st.className='conn-status err';
    document.getElementById('joinBtn').disabled=false; return;
  }
  ws.onopen = () => {
    ws.send(JSON.stringify({type:'join',name}));
    document.getElementById('joinScreen').style.display='none';
    document.getElementById('statusDot').className='dot';
    document.getElementById('statusText').textContent='подключён как '+name;
    document.getElementById('msgInput').disabled=false;
    document.getElementById('sendBtn').disabled=false;
    document.getElementById('msgInput').focus();
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type==='history') msg.messages.forEach(m=>addMessage(m));
    else if (msg.type==='message') addMessage(msg);
    else if (msg.type==='system') addSystem(msg.text);
    else if (msg.type==='users') renderUsers(msg.users);
  };
  ws.onclose = () => {
    document.getElementById('statusDot').className='dot off';
    document.getElementById('statusText').textContent='отключён';
    document.getElementById('msgInput').disabled=true;
    document.getElementById('sendBtn').disabled=true;
  };
  ws.onerror = () => {
    st.textContent='✗ Не удалось подключиться'; st.className='conn-status err';
    document.getElementById('joinBtn').disabled=false;
    document.getElementById('joinScreen').style.display='flex';
  };
}

function nameColor(n) {
  const c=['#7c6dfa','#fa6d8a','#4dfa9a','#facc4d','#4dc8fa','#fa9a4d','#c84dfa'];
  let h=0; for(let i=0;i<n.length;i++) h=(h*31+n.charCodeAt(i))%c.length;
  return c[Math.abs(h)];
}

function addMessage(msg) {
  const msgs = document.getElementById('messages');
  const isMe = msg.name === myName;
  const group = document.createElement('div');
  group.className = 'msg-group '+(isMe?'me':'other');

  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  meta.innerHTML = `<span style="color:${nameColor(msg.name)}">${msg.name}</span><span>${msg.time}</span>`;
  group.appendChild(meta);

  if (msg.image) {
    const wrap = document.createElement('div');
    wrap.className = 'img-bubble';
    wrap.onclick = () => openLightbox(msg.image);
    const img = document.createElement('img');
    img.src = msg.image; img.alt = 'фото';
    wrap.appendChild(img);
    group.appendChild(wrap);
  }
  if (msg.text) {
    const b = document.createElement('div');
    b.className = 'bubble'; b.textContent = msg.text;
    group.appendChild(b);
  }

  msgs.appendChild(group);
  msgs.scrollTop = msgs.scrollHeight;
}

function addSystem(text) {
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className='sys-msg'; d.textContent='// '+text;
  msgs.appendChild(d); msgs.scrollTop=msgs.scrollHeight;
}

function renderUsers(users) {
  const list = document.getElementById('userList');
  list.innerHTML='';
  users.forEach(u => {
    const item = document.createElement('div');
    item.className='user-item';
    item.innerHTML=`<div class="uavatar" style="background:${nameColor(u)}20;color:${nameColor(u)};border:1px solid ${nameColor(u)}40">${u[0].toUpperCase()}</div><div class="uname">${u}</div>${u===myName?'<div class="you-tag">ты</div>':''}`;
    list.appendChild(item);
  });
}

function handleImageSelect(e) {
  const file = e.target.files[0]; if(!file) return;
  if(file.size > 4*1024*1024){alert('Максимум 4 МБ!');return;}
  const reader = new FileReader();
  reader.onload = ev => {
    pendingImage = ev.target.result;
    document.getElementById('imgPreviewThumb').src = ev.target.result;
    document.getElementById('imgPreviewName').textContent = file.name;
    document.getElementById('imgPreviewBar').classList.add('show');
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

function removeImage() {
  pendingImage=null;
  document.getElementById('imgPreviewBar').classList.remove('show');
}

function sendMsg() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if(!text && !pendingImage) return;
  if(!ws||ws.readyState!==1) return;
  const payload = {type:'message', text: text||''};
  if(pendingImage) payload.image = pendingImage;
  ws.send(JSON.stringify(payload));
  input.value=''; input.style.height='auto';
  removeImage();
}

function openLightbox(src) {
  lbSrc=src;
  document.getElementById('lightboxImg').src=src;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox(){document.getElementById('lightbox').classList.remove('show');}
function downloadImg(e) {
  e.stopPropagation();
  const a=document.createElement('a'); a.href=lbSrc; a.download='image.png'; a.click();
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox();});

document.getElementById('msgInput').addEventListener('input',function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,120)+'px';
});
document.getElementById('msgInput').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}
});
document.getElementById('nameInput').addEventListener('keydown',e=>{if(e.key==='Enter')connect();});

// Ctrl+V — вставить картинку из буфера
document.addEventListener('paste',e=>{
  if(!ws||ws.readyState!==1) return;
  for(const item of e.clipboardData.items){
    if(item.type.startsWith('image/')){
      const file=item.getAsFile();
      if(file.size>4*1024*1024){alert('Слишком большая!');return;}
      const reader=new FileReader();
      reader.onload=ev=>{
        pendingImage=ev.target.result;
        document.getElementById('imgPreviewThumb').src=ev.target.result;
        document.getElementById('imgPreviewName').textContent='из буфера обмена';
        document.getElementById('imgPreviewBar').classList.add('show');
      };
      reader.readAsDataURL(file); break;
    }
  }
});
</script>
</body>
</html>
